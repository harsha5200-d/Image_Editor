<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Theme & Styles -->
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="style.css">

    <!-- Icons -->
    <link
        href="https://cdn.js
        
        delivr.net/npm/remixicon@4.7.0/fonts/remixicon.css"
        rel="stylesheet"
    />

    <!-- Website Title -->
    <title>PixelForge — Image Editor</title>
</head>
<body>

    <!-- =======================
         HEADER / BRANDING
    ======================== -->
    <header>
        <div class="logo">PixelForge</div>
        <div class="tagline">Professional image editing, simplified</div>
    </header>

    <!-- =======================
         MAIN APP
    ======================== -->
    <main>
        <section>

            <!-- LEFT PANEL -->
            <div class="left">

                <!-- TOP CONTROLS -->
                <div class="top">
                    <label for="image-input" class="btn">
                        <i class="ri-upload-cloud-2-line"></i>
                        Choose Image
                        <input type="file" id="image-input" accept="image/*" hidden>
                    </label>

                    <button class="btn" id="reset-btn">
                        <i class="ri-refresh-line"></i>
                        Reset
                    </button>

                    <button class="btn" id="download-btn">
                        <i class="ri-download-line"></i>
                        Download
                    </button>
                </div>

                <!-- IMAGE WORKSPACE -->
                <div class="bottom">
                    <div class="placeholder">
                        <i class="ri-image-line"></i>
                        <p>No image selected</p>
                    </div>

                    <canvas id="image-canvas"></canvas>
                </div>

            </div>

            <!-- RIGHT PANEL -->
            <div class="right">
                <h2>Filters</h2>
                <div class="filter"></div>

                <h2>Presets</h2>
                <div class="presets"></div>
            </div>

        </section>
    </main>

    <!-- SCRIPT -->
    <script src="script.js"></script>

</body>
</html>
